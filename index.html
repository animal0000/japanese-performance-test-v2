<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일본어 수행평가 - 배재중학교</title>
    <meta name="description" content="배재중학교 일본어 수행평가 문제은행 랜덤 출제 시스템">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #1A2F8A;
            --color-accent: #C0392B;
            --color-success: #27AE60;
            --color-warning: #F1C40F;
            --color-bg-light: #f8fafc;
            --color-surface: rgba(255, 255, 255, 0.85);
            --shadow-md: 0 10px 25px -5px rgba(26, 47, 138, 0.1), 0 8px 10px -6px rgba(26, 47, 138, 0.1);
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 애니메이션 배경 블롭 */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 60vmax;
            height: 60vmax;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
            animation: float 25s infinite alternate ease-in-out;
        }
        body::before {
            background: radial-gradient(circle, var(--color-primary) 0%, transparent 70%);
            top: -20%;
            left: -10%;
        }
        body::after {
            background: radial-gradient(circle, var(--color-accent) 0%, transparent 70%);
            bottom: -20%;
            right: -10%;
            animation-delay: -12s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(10%, 15%) scale(1.1); }
            66% { transform: translate(-5%, 10%) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .japanese-font { font-family: 'Noto Sans JP', sans-serif; }

        /* 글라스모피즘 표면 */
        .glass-card {
            background: var(--color-surface);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }

        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(26, 47, 138, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-primary); }

        /* 타이머 UI */
        .timer-display {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(to bottom, var(--color-primary), #4338ca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-variant-numeric: tabular-nums;
        }

        /* 퀴즈 UI */
        .quiz-container {
            position: relative;
            background: radial-gradient(circle at 10% 20%, rgba(26, 47, 138, 0.03) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(192, 57, 43, 0.03) 0%, transparent 40%);
        }
        .quiz-text {
            /* font-size는 JS의 fitQuestionText()가 실시간으로 계산해 inline으로 주입 */
            line-height: 1.2;
            font-weight: 900;
            color: var(--color-primary);
            text-shadow: 0 10px 30px rgba(26, 47, 138, 0.1);
            padding: 0.75rem;
            /* 일본어/한국어 모두 자연스럽게 줄바꿈 허용 (긴 문장도 잘리지 않도록) */
            word-break: normal;
            overflow-wrap: anywhere;
            max-width: 100%;
        }
        /* 카드는 기본 가용 높이에 맞되, 큰 폰트 유지를 위해 세로로 자랄 수 있게 둠 */
        .quiz-container { min-height: 60vh; }

        /* 버튼 */
        .btn-premium {
            background-color: var(--color-primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(26, 47, 138, 0.3);
            filter: brightness(115%);
        }
        .btn-premium:active { transform: scale(0.95); }

        .btn-outline {
            background-color: transparent;
            border: 2px solid rgba(26, 47, 138, 0.1);
            color: var(--color-primary);
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 700;
            transition: all 0.3s;
        }
        .btn-outline:hover { background: rgba(26, 47, 138, 0.05); border-color: var(--color-primary); }

        /* 학습용 카드 정답 토글 */
        .study-card {
            cursor: pointer;
            user-select: none;
        }
        .study-card .answer-box {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 0;
            padding-top: 0;
            border-top: 1px solid transparent;
        }
        .study-card.show-answer .answer-box {
            opacity: 1;
            max-height: 150px;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(26, 47, 138, 0.1);
        }
        .study-card .answer-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--color-primary);
            font-size: 0.85rem;
            font-weight: 800;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(226, 232, 240, 0.5);
        }
        .study-card:hover .answer-hint {
            opacity: 1;
            transform: translateY(-2px);
        }
        .study-card.show-answer .answer-hint {
            display: none;
        }

        /* 애니메이션 */
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 시작 화면 전용 */
        .hero-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            animation: pulse-glow 4s ease-in-out infinite alternate;
        }
        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 0.15; }
            100% { transform: scale(1.3); opacity: 0.25; }
        }

        /* 문제 번호 뱃지 */
        .question-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--color-primary);
            color: white;
            font-weight: 900;
            font-size: 1.25rem;
            box-shadow: 0 4px 15px rgba(26, 47, 138, 0.3);
        }

        /* 로딩 스피너 */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(26, 47, 138, 0.1);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 인쇄 스타일 */
        @media print {
            @page { size: A4 landscape; margin: 15mm; }
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="app" class="flex-grow flex flex-col">
        <main id="view-container" class="flex-grow flex flex-col p-6 max-w-7xl mx-auto w-full">
            <!-- 로딩 표시 -->
            <div class="flex-grow flex items-center justify-center">
                <div class="spinner"></div>
            </div>
        </main>
    </div>

    <script>
        /**
         * 스토리지 키
         */
        const STORAGE_KEY = 'JP_V2_QUESTION_BANK';
        const STORAGE_DATE_KEY = 'JP_V2_UPDATED_AT';

        /**
         * 상태 관리
         */
        let state = {
            view: 'SETUP',       // SETUP, QUIZ, RESULT
            questionBank: [],    // CSV에서 로드한 전체 문제
            quiz: [],            // 셔플 후 선택된 20문제
            currentIdx: 0,
            isPaused: false,
            timeLeft: 10,
            timerId: null,
            lastUpdated: null    // CSV 업데이트 날짜
        };

        /**
         * 오디오 (전환음)
         */
        const playDing = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.05);

                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch (e) {
                console.error('Audio play failed:', e);
            }
        };

        /**
         * CSV 텍스트를 문제 배열로 파싱
         */
        function parseCSV(text) {
            const rows = text.split('\n').filter(r => r.trim());
            return rows.map(row => {
                const match = row.match(/^"?([^"]*)"?\s*,\s*"?([^"]*)"?\s*$/);
                if (match) {
                    return { question: match[1].trim(), answer: match[2].trim() };
                }
                const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                return { question: cols[0] || '', answer: cols[1] || '' };
            }).filter(item => item.question && item.answer);
        }

        /**
         * localStorage에 문제은행 저장
         */
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.questionBank));
            localStorage.setItem(STORAGE_DATE_KEY, state.lastUpdated.toISOString());
        }

        /**
         * localStorage에서 문제은행 로드 (있으면 true)
         */
        function loadFromStorage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            const savedDate = localStorage.getItem(STORAGE_DATE_KEY);
            if (saved) {
                state.questionBank = JSON.parse(saved);
                state.lastUpdated = savedDate ? new Date(savedDate) : new Date();
                return true;
            }
            return false;
        }

        /**
         * 서버 CSV에서 문제은행 로드 (최초 또는 초기화 시)
         */
        async function loadFromServer() {
            try {
                const res = await fetch('./questions.csv');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const lastMod = res.headers.get('Last-Modified');
                state.lastUpdated = lastMod ? new Date(lastMod) : new Date();

                const text = await res.text();
                state.questionBank = parseCSV(text);
                saveToStorage();
                return true;
            } catch (e) {
                console.error('CSV 로드 실패:', e);
                return false;
            }
        }

        /**
         * 문제은행 로드 (localStorage 우선 → 서버 fallback)
         */
        async function loadQuestionBank() {
            if (!loadFromStorage()) {
                await loadFromServer();
            }
        }

        /**
         * 셔플 (Fisher-Yates)
         */
        function shuffle(array) {
            const arr = [...array];
            let currentIndex = arr.length;
            while (currentIndex !== 0) {
                const randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [arr[currentIndex], arr[randomIndex]] = [arr[randomIndex], arr[currentIndex]];
            }
            return arr;
        }

        /**
         * 서수 표기
         */
        function getOrdinal(n) {
            const s = ['th', 'st', 'nd', 'rd'];
            const v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        /**
         * 렌더링
         */
        function render() {
            const container = document.getElementById('view-container');
            container.innerHTML = '';

            if (state.view === 'SETUP') {
                renderSetup(container);
            } else if (state.view === 'QUIZ') {
                renderQuiz(container);
            } else if (state.view === 'RESULT') {
                renderResult(container);
            } else if (state.view === 'STUDY') {
                renderStudy(container);
            }
        }

        /**
         * 화면 A: SETUP (시작 화면)
         */
        function renderSetup(container) {
            const itemCount = state.questionBank.length;
            const canStart = itemCount >= 20;

            container.innerHTML = `
                <div class="fade-in flex-grow flex flex-col items-center justify-center relative">
                    <!-- 배경 글로우 -->
                    <div class="hero-glow" style="top: 10%; left: 20%; background: var(--color-primary);"></div>
                    <div class="hero-glow" style="bottom: 10%; right: 20%; background: var(--color-accent); animation-delay: -2s;"></div>

                    <!-- 학교 뱃지 -->
                    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-indigo-100 text-[#1A2F8A] text-xs font-black mb-8 tracking-widest uppercase">
                        <span class="w-2 h-2 rounded-full bg-[#1A2F8A] animate-pulse"></span>
                        PAICHAI MIDDLE SCHOOL
                    </div>

                    <!-- 타이틀 -->
                    <h1 class="text-6xl md:text-7xl font-black text-[#1A2F8A] mb-4 tracking-tight text-center">
                        일본어 수행평가
                    </h1>
                    <p class="text-lg text-slate-400 font-medium mb-2 text-center">
                        크고자 하거든 남을 섬기라 — 배재중학교 창립 정신
                    </p>

                    <!-- 문제 수 + 업데이트 날짜 표시 -->
                    <div class="mt-6 mb-12 flex flex-col items-center gap-3">
                        <div class="px-5 py-2.5 rounded-full bg-[#1A2F8A]/5 text-[#1A2F8A] text-sm font-black uppercase tracking-wider">
                            📋 문제은행 ${itemCount}개 → 랜덤 20문제 출제
                        </div>
                        ${state.lastUpdated ? `
                            <div class="text-xs text-slate-400 font-medium">
                                🕐 데이터 업데이트: ${state.lastUpdated.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' })}
                            </div>
                        ` : ''}
                    </div>

                    <!-- 버튼 그룹 -->
                    <div class="flex flex-col items-center gap-5">
                        <button
                            id="btn-start"
                            onclick="startAssessment()"
                            class="bg-[#1A2F8A] hover:bg-[#15246a] text-white px-16 py-7 rounded-3xl text-2xl font-black shadow-2xl shadow-indigo-200 transition-all hover:scale-105 active:scale-95 flex items-center gap-4 ${canStart ? '' : 'opacity-40 cursor-not-allowed pointer-events-none'}"
                        >
                            🚀 평가 시작하기
                        </button>

                        <div class="flex gap-4">
                            <a href="answer_sheet.html" target="_blank" class="btn-outline flex items-center gap-2">
                                📝 답안지 인쇄
                            </a>
                            <button onclick="goToStudy()" class="btn-outline flex items-center gap-2 text-[#1A2F8A]">
                                📖 전체 문항 학습
                            </button>
                            <label class="cursor-pointer btn-outline flex items-center gap-2">
                                📂 CSV 교체
                                <input type="file" accept=".csv" class="hidden" onchange="handleCSVUpload(event)">
                            </label>
                        </div>

                        ${!canStart ? `
                            <p class="text-sm text-[#C0392B] font-bold mt-2">
                                ⚠️ 최소 20개 이상의 문제가 필요합니다. (현재 ${itemCount}개)
                            </p>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        /**
         * CSV 업로드 처리 (localStorage에 영구 저장)
         */
        window.handleCSVUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                state.questionBank = parseCSV(text);
                state.lastUpdated = new Date();
                saveToStorage();
                render();
            };
            reader.readAsText(file);
        };

        /**
         * 기본 데이터(서버 CSV)로 초기화
         */
        window.resetToDefault = async () => {
            if (!confirm('업로드한 CSV를 삭제하고 기본 데이터로 초기화합니다.\n계속하시겠습니까?')) return;
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(STORAGE_DATE_KEY);
            await loadFromServer();
            render();
        };

        /**
         * 평가 시작
         */
        window.startAssessment = () => {
            if (state.questionBank.length < 20) {
                alert('최소 20개 이상의 문제가 필요합니다.');
                return;
            }

            const shuffled = shuffle(state.questionBank);
            state.quiz = shuffled.slice(0, 20);

            state.view = 'QUIZ';
            state.currentIdx = 0;
            state.timeLeft = 10;
            state.isPaused = false;
            render();
            startTimer();
        };

        /**
         * 화면 B: QUIZ
         */
        function renderQuiz(container) {
            const q = state.quiz[state.currentIdx];

            container.innerHTML = `
                <div class="flex flex-col flex-grow fade-in h-full">
                    <!-- 진행 상태 -->
                    <div class="mb-12">
                        <div class="flex justify-between items-end mb-4">
                            <div>
                                <h2 class="text-3xl font-black text-[#1A2F8A]">QUESTION ${String(state.currentIdx + 1).padStart(2, '0')} <span class="text-slate-300 font-medium">/ 20</span></h2>
                                <p class="text-xl font-bold text-[#1A2F8A] mt-1">
                                    문제를 보고 답을 답안지에 작성하세요.
                                </p>
                            </div>
                            <div class="text-right">
                                <span class="timer-display">${Math.ceil(state.timeLeft)}</span>
                                <span class="text-xl font-black text-slate-400 ml-2">SEC</span>
                            </div>
                        </div>
                        <div class="h-3 bg-slate-200 rounded-full overflow-hidden shadow-inner">
                            <div id="progress-bar" class="h-full bg-[#1A2F8A] transition-all ease-linear" style="width: 100%"></div>
                        </div>
                    </div>

                    <!-- 문제 표시 -->
                    <div class="flex-grow flex items-center justify-center glass-card quiz-container mb-12 relative overflow-hidden">
                        <div class="absolute inset-0 opacity-[0.02] select-none pointer-events-none flex flex-wrap gap-10 p-10 overflow-hidden font-black text-4xl">
                            ${Array(100).fill('あいうえお').join(' ')}
                        </div>
                        <div class="quiz-text text-center select-none japanese-font">
                            ${q.question}
                        </div>
                    </div>

                    <!-- 컨트롤 -->
                    <div class="flex justify-center items-center gap-6 px-4">
                        <button onclick="prevQuiz()" class="btn-outline w-32 justify-center">PREV</button>
                        <button onclick="togglePause()" id="pause-btn" class="btn-premium w-64 justify-center text-xl">
                           ${state.isPaused ? '▶ RESUME' : '⏸ PAUSE'}
                        </button>
                        <button onclick="nextQuiz()" class="btn-premium w-32 justify-center bg-[#C0392B]">NEXT</button>
                    </div>
                </div>
            `;
            updateProgressBar();
            // 레이아웃이 그려진 뒤 컨테이너 실측 → 최대 폰트 자동 산출
            requestAnimationFrame(() => requestAnimationFrame(fitQuestionText));
        }

        /**
         * 문제 텍스트를 컨테이너에 맞춰 최대한 크게 키우되 잘리지 않도록 조절.
         * 이분 탐색으로 fit-to-box (가로/세로 모두 만족하는 최대 폰트 px).
         */
        function fitQuestionText() {
            const box = document.querySelector('.quiz-container');
            const el  = box && box.querySelector('.quiz-text');
            if (!box || !el) return;

            // 컨테이너 가용 영역 (안전 여백 16px)
            const safety = 16;
            const availW = box.clientWidth  - safety;
            const availH = box.clientHeight - safety;
            if (availW <= 0 || availH <= 0) return;

            // 측정 전 max-width 고정 → 줄바꿈 기준 일치
            el.style.maxWidth = availW + 'px';
            el.style.whiteSpace = 'normal';

            // 최소 폰트는 20px로 설정하여 긴 문장도 화면에 다 들어오도록 보장하고,
            // 최대 폰트는 컨테이너 높이에 비례하여 너무 비정상적으로 커지지 않게 제한합니다.
            const minFontSize = 20;
            const maxFontSize = Math.min(160, Math.round(availH * 0.35));

            const fits = (px) => {
                el.style.fontSize = px + 'px';
                return el.scrollWidth <= availW && el.scrollHeight <= availH;
            };

            // 이분 탐색: 가로/세로 모두 만족하는 최대 폰트 px
            let lo = minFontSize, hi = maxFontSize, best = lo;
            while (lo <= hi) {
                const mid = (lo + hi) >> 1;
                if (fits(mid)) { 
                    best = mid; 
                    lo = mid + 1; 
                } else { 
                    hi = mid - 1; 
                }
            }

            // 찾은 최적의 폰트 크기를 적용하여 절대 잘리거나 넘치지 않게 합니다.
            el.style.fontSize = best + 'px';
            box.style.minHeight = ''; // 컨트롤러가 화면 밖으로 밀리지 않도록 고정
        }

        // 창 크기 변경 시에도 재계산
        window.addEventListener('resize', () => {
            if (state.view === 'QUIZ') fitQuestionText();
        });

        function startTimer() {
            if (state.timerId) clearInterval(state.timerId);
            state.timerId = setInterval(() => {
                if (state.isPaused) return;

                state.timeLeft -= 0.1;
                if (state.timeLeft <= 0) {
                    nextQuiz();
                } else {
                    updateProgressBar();
                }
            }, 100);
        }

        function updateProgressBar() {
            const bar = document.getElementById('progress-bar');
            const timerText = document.querySelector('span.timer-display');
            if (!bar) return;

            const pct = (state.timeLeft / 10) * 100;
            bar.style.width = `${pct}%`;

            if (pct > 50) bar.style.backgroundColor = '#1A2F8A';
            else if (pct > 20) bar.style.backgroundColor = '#f59e0b';
            else bar.style.backgroundColor = '#C0392B';

            if (timerText) timerText.innerText = Math.max(0, Math.ceil(state.timeLeft));
        }

        window.togglePause = () => {
            state.isPaused = !state.isPaused;
            const btn = document.getElementById('pause-btn');
            if (btn) btn.innerText = state.isPaused ? '▶ RESUME' : '⏸ PAUSE';
        };

        window.nextQuiz = () => {
            if (state.currentIdx < state.quiz.length - 1) {
                state.currentIdx++;
                state.timeLeft = 10;
                playDing();
                render();
            } else {
                finishAssessment();
            }
        };

        window.prevQuiz = () => {
            if (state.currentIdx > 0) {
                state.currentIdx--;
                state.timeLeft = 10;
                playDing();
                render();
            }
        };

        function finishAssessment() {
            clearInterval(state.timerId);
            state.view = 'RESULT';
            render();
        }

        /**
         * 화면 C: RESULT
         */
        function renderResult(container) {
            container.innerHTML = `
                <div class="fade-in max-w-4xl mx-auto w-full text-center">
                    <div class="mb-16">
                        <div class="text-9xl mb-8 drop-shadow-2xl">🏆</div>
                        <h1 class="text-6xl font-black text-[#1A2F8A] mb-4">ASSESSMENT COMPLETE</h1>
                        <p class="text-xl text-slate-500 font-medium uppercase tracking-[0.2em]">수고하셨습니다. 창조적인 배재인이 되기를 응원합니다.</p>
                    </div>

                    <div class="glass-card p-12 mb-12">
                        <div class="flex flex-col gap-8">
                            <button onclick="downloadResults()" class="btn-premium w-full py-8 text-3xl justify-center scale-105">
                                📊 정답 데이터 (CSV) 저장하기
                            </button>
                            <div class="grid grid-cols-3 gap-6">
                                <button onclick="showAnswers()" class="btn-outline py-6 text-xl justify-center bg-white/50">
                                    🔍 정답 확인
                                </button>
                                <button onclick="startAssessment()" class="btn-outline py-6 text-xl justify-center">
                                    🔄 다시 풀기
                                </button>
                                <button onclick="goToSetup()" class="btn-outline py-6 text-xl justify-center border-dashed">
                                    ⚙️ 처음으로
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="answer-table-container" class="hidden fade-in text-left">
                        <div class="glass-card overflow-hidden">
                            <table class="w-full border-collapse">
                                <thead>
                                    <tr class="bg-slate-50">
                                        <th class="p-6 border-b text-[#1A2F8A] font-black w-20 text-center">NO.</th>
                                        <th class="p-6 border-b text-[#1A2F8A]">문제 (QUESTION)</th>
                                        <th class="p-6 border-b text-[#1A2F8A]">정답 (ANSWER)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${state.quiz.map((q, i) => `
                                        <tr class="hover:bg-[#1A2F8A]/5 transition border-b border-slate-100 last:border-0">
                                            <td class="p-6 text-slate-400 font-mono text-center font-bold">${i + 1}</td>
                                            <td class="p-6 text-3xl font-black japanese-font text-[#1A2F8A]">
                                                ${q.question}
                                            </td>
                                            <td class="p-6 text-3xl font-black text-[#C0392B]">
                                                ${q.answer}
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                        <div class="mt-12 text-center pb-20">
                             <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="text-[#1A2F8A] font-black hover:underline uppercase tracking-widest">Back to top ↑</button>
                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * 결과 CSV 다운로드
         */
        window.downloadResults = () => {
            const classInfo = prompt('몇학년 몇반인가요? (예: 2-1)', '2-1');
            if (!classInfo) return;

            const testNum = prompt('몇번째 시험인가요? (숫자만 입력)', '1');
            if (!testNum) return;

            const formattedClass = classInfo.replace('-', '_');
            const ordinalTest = getOrdinal(parseInt(testNum));
            const fileName = `${formattedClass}_${ordinalTest}.csv`;

            const header = 'No,문제,정답';
            const rows = state.quiz.map((q, i) =>
                `${i + 1},"${q.question}","${q.answer}"`
            );

            const csvContent = [header, ...rows].join('\r\n');
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            link.click();
        };

        window.showAnswers = () => {
            const container = document.getElementById('answer-table-container');
            container.classList.remove('hidden');
            container.scrollIntoView({ behavior: 'smooth' });
        };

        window.goToSetup = () => {
            state.view = 'SETUP';
            render();
        };

        window.goToStudy = () => {
            state.view = 'STUDY';
            render();
        };

        /**
         * 화면 D: STUDY (문제은행 전체보기)
         */
        function renderStudy(container) {
            container.innerHTML = `
                <div class="flex flex-col flex-grow fade-in h-full relative">
                    <!-- 배경 글로우 -->
                    <div class="hero-glow" style="top: -10%; left: -10%; background: var(--color-primary); opacity: 0.05;"></div>
                    <div class="hero-glow" style="bottom: -10%; right: -10%; background: var(--color-accent); opacity: 0.05;"></div>

                    <div class="mb-8 flex justify-between items-end relative z-10">
                        <div>
                            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-[#1A2F8A]/10 text-[#1A2F8A] text-xs font-black mb-3 tracking-widest uppercase">
                                <span class="w-1.5 h-1.5 rounded-full bg-[#1A2F8A]"></span>
                                STUDY MODE
                            </div>
                            <h2 class="text-4xl font-black text-[#1A2F8A]">전체 문항 학습</h2>
                            <p class="text-lg font-medium text-slate-400 mt-2">카드를 클릭하면 한글 뜻(정답)이 나타납니다. (총 ${state.questionBank.length}문항)</p>
                        </div>
                        <button onclick="goToSetup()" class="btn-outline px-6 bg-white">
                            ← 뒤로가기
                        </button>
                    </div>

                    <div class="flex-grow overflow-y-auto pr-4 custom-scrollbar pb-12 relative z-10" id="study-scroll-container">
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                            ${state.questionBank.map((q, idx) => `
                                <div class="glass-card study-card flex flex-col p-7 hover:-translate-y-1 transition-all duration-300 border border-slate-200/60 hover:border-[#1A2F8A]/30 hover:shadow-xl hover:shadow-indigo-500/10 bg-white/70 backdrop-blur-md" onclick="this.classList.toggle('show-answer')">
                                    <div class="text-sm font-black text-slate-300 mb-4 tracking-wider">QUESTION ${String(idx + 1).padStart(2, '0')}</div>
                                    <div class="text-3xl font-bold text-[#1A2F8A] mb-8 japanese-font break-keep leading-snug">${q.question}</div>
                                    
                                    <div class="answer-hint">
                                        <span>🔍 클릭하여 뜻 보기</span>
                                    </div>
                                    
                                    <div class="answer-box">
                                        <div class="text-xs font-black text-slate-400 mb-1">뜻 / 정답</div>
                                        <div class="text-2xl font-black text-[#C0392B]">${q.answer}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-12 text-center">
                             <button onclick="document.getElementById('study-scroll-container').scrollTo({top: 0, behavior: 'smooth'})" class="text-[#1A2F8A] font-black hover:underline uppercase tracking-widest px-4 py-2">Back to top ↑</button>
                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * 초기화
         */
        async function init() {
            await loadQuestionBank();
            render();
        }

        init();
    </script>
</body>
</html>
